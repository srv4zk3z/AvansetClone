<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Buscar Preguntas | SRVAZKEZ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="js/core/theme.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sidebar" id="sidebar">
    <button class="btn btn-sm btn-outline-secondary w-100 mb-3" id="toggleSidebar" title="Expandir / contraer menú">
      <i class="fas fa-bars"></i>
    </button>
    <h4 class="brand">SRVAZKEZ</h4>
    <ul class="nav flex-column mt-3">
      <li class="nav-item"><a href="./index.html" class="nav-link" title="Simulador"><i class="fas fa-pencil-alt"></i> <span>Simulador</span></a></li>
      <li class="nav-item"><a href="./preguntas.html" class="nav-link active" aria-current="page" title="Preguntas"><i class="fas fa-question-circle"></i> <span>Preguntas</span></a></li>
      <li class="nav-item"><a href="./preguntasmalas.html" class="nav-link" title="Top errores"><i class="fas fa-exclamation-triangle"></i> <span>Top errores</span></a></li>
      <li class="nav-item"><a href="./metricas.html" class="nav-link" title="Métricas"><i class="fas fa-chart-line"></i> <span>Métricas</span></a></li>
      <li class="nav-item"><a href="./admin.html" class="nav-link" title="Administrar"><i class="fas fa-gear"></i> <span>Administrar</span></a></li>
    </ul>
  </div>

  <div class="main-content" id="mainContent">
    <div class="page-header">
      <h1><i class="fas fa-question-circle text-info me-2"></i>Buscador de preguntas</h1>
      <p class="subtitle">Explora todo el banco de preguntas o busca por palabra clave. Las coincidencias se resaltan en los resultados.</p>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <form id="searchForm" class="row g-3" onsubmit="return false;">
          <div class="col-12 col-md-8">
            <label for="searchInput" class="form-label">Buscar en el texto de la pregunta</label>
            <input type="search" class="form-control" id="searchInput" placeholder="Ej. firewall, correlation rule, playbook..." aria-describedby="searchHelp">
          </div>
          <div class="col-12 col-md-auto d-flex align-items-end">
            <button type="submit" id="buscarBtn" class="btn btn-primary">
              <i class="fas fa-magnifying-glass me-1"></i> Buscar
            </button>
          </div>
          <div class="col-12">
            <small id="searchHelp" class="text-secondary">Deja el campo vacío y presiona Buscar (o Enter) para ver todas las preguntas.</small>
          </div>
        </form>
      </div>
    </div>

    <div id="resultados" aria-live="polite"></div>
    <nav id="paginador" class="d-flex justify-content-center align-items-center flex-wrap gap-2 mt-4" aria-label="Paginación de resultados"></nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/core/namespace.js"></script>
  <script src="js/core/dom.js"></script>
  <script src="js/core/format.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/components/layout.js"></script>
  <script src="js/components/feedback.js"></script>
  <script src="js/components/pagination.js"></script>
  <script src="js/components/question-card.js"></script>
  <script src="js/pages/questions.js"></script>
</body>
</html>
