<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Métricas | SRVAZKEZ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="js/core/theme.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sidebar" id="sidebar">
    <button class="btn btn-sm btn-outline-secondary w-100 mb-3" id="toggleSidebar" title="Expandir / contraer menú">
      <i class="fas fa-bars"></i>
    </button>
    <h4 class="brand">SRVAZKEZ</h4>
    <ul class="nav flex-column mt-3">
      <li class="nav-item"><a href="./index.html" class="nav-link" title="Simulador"><i class="fas fa-pencil-alt"></i> <span>Simulador</span></a></li>
      <li class="nav-item"><a href="./preguntas.html" class="nav-link" title="Preguntas"><i class="fas fa-question-circle"></i> <span>Preguntas</span></a></li>
      <li class="nav-item"><a href="./preguntasmalas.html" class="nav-link" title="Top errores"><i class="fas fa-exclamation-triangle"></i> <span>Top errores</span></a></li>
      <li class="nav-item"><a href="./metricas.html" class="nav-link active" aria-current="page" title="Métricas"><i class="fas fa-chart-line"></i> <span>Métricas</span></a></li>
      <li class="nav-item"><a href="./admin.html" class="nav-link" title="Administrar"><i class="fas fa-gear"></i> <span>Administrar</span></a></li>
    </ul>
  </div>

  <div class="main-content" id="mainContent">
    <div class="page-header">
      <h1><i class="fas fa-chart-line text-info me-2"></i>Métricas de progreso</h1>
      <p class="subtitle">Tu avance a lo largo de los exámenes: calificaciones, tendencia y desempeño por dominio. La línea punteada marca el 72% necesario para aprobar el PCSAE.</p>
    </div>

    <div id="contenido">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-secondary mt-3 mb-0">Cargando tus métricas...</p>
      </div>
    </div>
  </div>

  <template id="plantilla">
    <!-- Tarjetas de resumen -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-lg-3">
        <div class="card stat-tile"><div class="card-body">
          <div class="stat-label"><i class="fas fa-clipboard-list me-1"></i>Exámenes realizados</div>
          <div class="stat-value" id="statIntentos">—</div>
        </div></div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card stat-tile"><div class="card-body">
          <div class="stat-label"><i class="fas fa-chart-simple me-1"></i>Promedio</div>
          <div class="stat-value" id="statPromedio">—</div>
        </div></div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card stat-tile"><div class="card-body">
          <div class="stat-label"><i class="fas fa-trophy me-1"></i>Mejor calificación</div>
          <div class="stat-value" id="statMejor">—</div>
        </div></div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card stat-tile"><div class="card-body">
          <div class="stat-label"><i class="fas fa-clock-rotate-left me-1"></i>Último examen</div>
          <div class="stat-value" id="statUltimo">—</div>
        </div></div>
      </div>
    </div>

    <!-- Evolución -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
          <h5 class="card-title mb-0">Evolución de calificación (%)</h5>
          <select id="rangoIntentos" class="form-select form-select-sm w-auto" aria-label="Intentos a mostrar">
            <option value="10">Últimos 10</option>
            <option value="25" selected>Últimos 25</option>
            <option value="50">Últimos 50</option>
            <option value="0">Todos</option>
          </select>
        </div>
        <div style="height:280px;"><canvas id="chartEvolucion"></canvas></div>
      </div>
    </div>

    <!-- Por dominio -->
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title mb-2">Acierto por dominio (%)</h5>
        <p class="text-secondary small mb-3">Acumulado de todos tus intentos. Pasa el cursor por una barra para ver el detalle.</p>
        <div id="chartDominiosWrap"><canvas id="chartDominios"></canvas></div>
        <details class="mt-3">
          <summary class="text-secondary small">Ver como tabla</summary>
          <div class="table-responsive mt-2">
            <table class="table table-sm align-middle mb-0" id="tablaDominios">
              <thead><tr><th>Dominio</th><th class="text-end">Correctas</th><th class="text-end">Incorrectas</th><th class="text-end">% Acierto</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </details>
      </div>
    </div>

    <!-- Historial -->
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title mb-3">Historial de exámenes</h5>
        <div class="table-responsive">
          <table class="table align-middle mb-0" id="tablaHistorial">
            <thead><tr><th>Fecha</th><th class="text-end">Preguntas</th><th class="text-end">Correctas</th><th class="text-end">Incorrectas</th><th class="text-end">Calificación</th><th class="text-center">Resultado</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="js/core/namespace.js"></script>
  <script src="js/core/dom.js"></script>
  <script src="js/core/format.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/components/layout.js"></script>
  <script src="js/components/feedback.js"></script>
  <script src="js/components/pagination.js"></script>
  <script src="js/components/question-card.js"></script>
  <script src="js/pages/metrics.js"></script>
</body>
</html>
