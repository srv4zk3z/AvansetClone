services:
  app:
    image: python:3.11-slim
    container_name: examsimulator-app
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-simulador}
      MONGO_USER: ${MONGO_USER:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_AUTH_SOURCE: admin
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
    depends_on:
      mongo:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    networks:
      - app-network

  mongo:
    image: mongo:6.0
    container_name: examsimulator-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_USER:-admin}", "-p", "${MONGO_PASSWORD:-secret}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  seed:
    image: python:3.11-slim
    container_name: examsimulator-seed
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir pymongo &&
             python data/bulk_insert.py"
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-simulador}
      MONGO_USER: ${MONGO_USER:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_AUTH_SOURCE: admin
      QUESTIONS_FILE: data/preguntas.json
    volumes:
      - .:/app
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  mongo-express:
    image: mongo-express
    container_name: examsimulator-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-secret}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-pass}
      ME_CONFIG_OPTIONS_EDITORTHEME: material-darker
      timezone: "America/Mexico_City"
      theme: "dark"
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
